<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FCG Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="config.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4 text-primary"><i class="bi bi-tools"></i> Painel Administrativo - FIAP Cloud Games</h2>

        <ul class="nav nav-tabs mb-4">
            <li class="nav-item"><button class="nav-link active" onclick="showTab('games')">🎮 Gerenciar Jogos</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('users')">👥 Gerenciar Usuários</button></li>
            <li class="nav-item ms-auto"><button class="btn btn-secondary" onclick="goBack()">⬅ Voltar ao Dashboard</button></li>
        </ul>

        <div id="content"></div>
    </div>

    <script>
        const token = localStorage.getItem("fcg_token");
        const { users, store, payments, getAuthHeaders, ensureAuthenticated } = window.apiConfig;

        if (!ensureAuthenticated()) return;

        function showTab(tab) {
            if (tab === "games") loadGames();
            if (tab === "users") loadUsers();
        }

        // 🎮 =================== GERENCIAMENTO DE JOGOS ===================
        async function loadGames() {
            try {
                const response = await fetch(store, { headers: getAuthHeaders() });
                if (!response.ok) throw new Error("Falha ao carregar jogos.");
                const games = await response.json();

                const html = `
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4>🎮 Jogos Cadastrados</h4>
                        <button class="btn btn-success btn-sm" onclick="showGameForm()">➕ Novo Jogo</button>
                    </div>
                    <input type="text" class="form-control mb-3" placeholder="🔍 Buscar jogo..." oninput="filterGames(event)">
                    <div id="gameList">${renderGames(games)}</div>
                `;
                document.getElementById("content").innerHTML = html;
                window.allGames = games;
            } catch (err) {
                alert("❌ Erro: " + err.message);
            }
        }

        function renderGames(games) {
            if (!games.length) return "<div class='alert alert-info'>Nenhum jogo cadastrado.</div>";
            return games.map(g => `
                <div class="card mb-3">
                    <div class="card-body">
                        <h5>${g.title}</h5>
                        <p>${g.description}</p>
                        <p><strong>Gênero:</strong> ${g.genre} | <strong>Preço:</strong> R$${g.price}</p>
                        <button class="btn btn-outline-primary btn-sm me-2" onclick="editGame('${g.id}')">✏️ Editar</button>
                        <button class="btn btn-outline-danger btn-sm" onclick="deleteGame('${g.id}')">🗑 Excluir</button>
                    </div>
                </div>
            `).join("");
        }

        function filterGames(e) {
            const term = e.target.value.toLowerCase();
            const filtered = window.allGames.filter(g => g.title.toLowerCase().includes(term));
            document.getElementById("gameList").innerHTML = renderGames(filtered);
        }

        function showGameForm(game = {}) {
            const isEdit = !!game.id;
            const html = `
                <h5>${isEdit ? "✏️ Editar Jogo" : "➕ Novo Jogo"}</h5>
                <form onsubmit="saveGame(event, '${game.id || ""}')">
                    <div class="mb-2">
                        <label>Título</label>
                        <input class="form-control" id="gameTitle" value="${game.title || ""}" required>
                    </div>
                    <div class="mb-2">
                        <label>Descrição</label>
                        <textarea class="form-control" id="gameDesc" required>${game.description || ""}</textarea>
                    </div>
                    <div class="mb-2">
                        <label>Gênero</label>
                        <input class="form-control" id="gameGenre" value="${game.genre || ""}" required>
                    </div>
                    <div class="mb-2">
                        <label>Preço</label>
                        <input type="number" step="0.01" class="form-control" id="gamePrice" value="${game.price || ""}" required>
                    </div>
                    <button class="btn btn-${isEdit ? "primary" : "success"}">${isEdit ? "Salvar Alterações" : "Cadastrar"}</button>
                    <button type="button" class="btn btn-secondary ms-2" onclick="loadGames()">Cancelar</button>
                </form>`;
            document.getElementById("content").innerHTML = html;
        }

        async function saveGame(e, id = "") {
            e.preventDefault();
            const body = {
                title: document.getElementById("gameTitle").value,
                description: document.getElementById("gameDesc").value,
                genre: document.getElementById("gameGenre").value,
                price: parseFloat(document.getElementById("gamePrice").value)
            };

            const url = id ? `${store}/${id}` : store;
            const method = id ? "PUT" : "POST";

            const res = await fetch(url, {
                method,
                headers: getAuthHeaders(),
                body: JSON.stringify(body)
            });

            if (res.ok) {
                alert(`✅ Jogo ${id ? "atualizado" : "criado"} com sucesso!`);
                loadGames();
            } else {
                alert("❌ Erro ao salvar jogo.");
            }
        }

        async function editGame(id) {
            const game = window.allGames.find(g => g.id === id);
            showGameForm(game);
        }

        async function deleteGame(id) {
            if (!confirm("Tem certeza que deseja excluir este jogo?")) return;
            const res = await fetch(`${store}/${id}`, {
                method: "DELETE",
                headers: getAuthHeaders()
            });
            if (res.ok) {
                alert("🗑️ Jogo removido com sucesso!");
                loadGames();
            } else {
                alert("❌ Erro ao remover jogo.");
            }
        }

        // 👥 =================== GERENCIAMENTO DE USUÁRIOS ===================
        async function loadUsers() {
            try {
                const res = await fetch(users, { headers: getAuthHeaders() });
                if (!res.ok) throw new Error("Falha ao carregar usuários.");
                const usersList = await res.json();

                const html = `
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4>👥 Usuários Cadastrados</h4>
                        <button class="btn btn-success btn-sm" onclick="showUserForm()">➕ Novo Usuário</button>
                    </div>
                    <input type="text" class="form-control mb-3" placeholder="🔍 Buscar usuário..." oninput="filterUsers(event)">
                    <div id="userList">${renderUsers(usersList)}</div>`;
                document.getElementById("content").innerHTML = html;
                window.allUsers = usersList;
            } catch (err) {
                alert("❌ Erro: " + err.message);
            }
        }

        function renderUsers(usersList) {
            if (!usersList.length) return "<div class='alert alert-info'>Nenhum usuário cadastrado.</div>";
            return usersList.map(u => `
                <div class="card mb-2">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <strong>${u.name}</strong> <br>
                            <small>${u.email}</small> <br>
                            <span class="badge bg-${u.role === "Admin" ? "danger" : "secondary"}">${u.role}</span>
                        </div>
                        <div>
                            <button class="btn btn-outline-primary btn-sm me-2" onclick="editUser('${u.id}')">✏️ Editar</button>
                            <button class="btn btn-outline-danger btn-sm" onclick="deleteUser('${u.id}')">🗑 Excluir</button>
                        </div>
                    </div>
                </div>`).join("");
        }

        function filterUsers(e) {
            const term = e.target.value.toLowerCase();
            const filtered = window.allUsers.filter(u => u.name.toLowerCase().includes(term) || u.email.toLowerCase().includes(term));
            document.getElementById("userList").innerHTML = renderUsers(filtered);
        }

        function showUserForm(user = {}) {
            const isEdit = !!user.id;
            const html = `
                <h5>${isEdit ? "✏️ Editar Usuário" : "➕ Novo Usuário"}</h5>
                <form onsubmit="saveUser(event, '${user.id || ""}')">
                    <div class="mb-2">
                        <label>Nome</label>
                        <input class="form-control" id="userName" value="${user.name || ""}" required>
                    </div>
                    <div class="mb-2">
                        <label>Email</label>
                        <input class="form-control" id="userEmail" type="email" value="${user.email || ""}" required>
                    </div>
                    <div class="mb-2">
                        <label>Senha</label>
                        <input class="form-control" id="userPassword" type="password" placeholder="${isEdit ? 'Deixe em branco para manter' : 'Informe a senha'}">
                    </div>
                    <div class="mb-2">
                        <label>Perfil</label>
                        <select class="form-control" id="userRole">
                            <option value="User" ${user.role === "User" ? "selected" : ""}>Usuário</option>
                            <option value="Admin" ${user.role === "Admin" ? "selected" : ""}>Admin</option>
                        </select>
                    </div>
                    <button class="btn btn-${isEdit ? "primary" : "success"}">${isEdit ? "Salvar Alterações" : "Cadastrar"}</button>
                    <button type="button" class="btn btn-secondary ms-2" onclick="loadUsers()">Cancelar</button>
                </form>`;
            document.getElementById("content").innerHTML = html;
        }

        async function saveUser(e, id = "") {
            e.preventDefault();
            const body = {
                name: document.getElementById("userName").value,
                email: document.getElementById("userEmail").value,
                passwordHash: document.getElementById("userPassword").value || undefined,
                role: document.getElementById("userRole").value
            };

            const url = id ? `${users}/${id}` : users;
            const method = id ? "PUT" : "POST";

            const res = await fetch(url, {
                method,
                headers: getAuthHeaders(),
                body: JSON.stringify(body)
            });

            if (res.ok) {
                alert(`✅ Usuário ${id ? "atualizado" : "criado"} com sucesso!`);
                loadUsers();
            } else {
                alert("❌ Erro ao salvar usuário.");
            }
        }

        async function editUser(id) {
            const user = window.allUsers.find(u => u.id === id);
            showUserForm(user);
        }

        async function deleteUser(id) {
            if (!confirm("Tem certeza que deseja excluir este usuário?")) return;
            const res = await fetch(`${users}/${id}`, {
                method: "DELETE",
                headers: getAuthHeaders()
            });
            if (res.ok) {
                alert("🗑️ Usuário removido com sucesso!");
                loadUsers();
            } else {
                alert("❌ Erro ao remover usuário.");
            }
        }

        function goBack() {
            window.location.href = "dashboard.html";
        }

        // Carrega aba padrão
        showTab("games");
    </script>
</body>
</html>
