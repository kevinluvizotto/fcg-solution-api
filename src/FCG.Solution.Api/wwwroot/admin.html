<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FCG Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="config.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4 text-primary"><i class="bi bi-tools"></i> Painel Administrativo - FIAP Cloud Games</h2>

        <ul class="nav nav-tabs mb-4">
            <li class="nav-item"><button class="nav-link active" id="tabGames">🎮 Gerenciar Jogos</button></li>
            <li class="nav-item"><button class="nav-link" id="tabUsers">👥 Gerenciar Usuários</button></li>
            <li class="nav-item ms-auto"><button class="btn btn-secondary" id="btnBack">⬅ Voltar ao Dashboard</button></li>
        </ul>

        <div id="content"></div>
    </div>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            if (!window.apiConfig) {
                alert("❌ Erro: config.js não foi carregado corretamente.");
                return;
            }

            // 👇 aqui a diferença — agora usamos mgmt no lugar de users
            const { mgmt, store, getAuthHeaders, ensureAuthenticated } = window.apiConfig;
            if (!ensureAuthenticated()) return;

            // 🧭 Abas
            document.getElementById("tabGames").addEventListener("click", () => showTab("games"));
            document.getElementById("tabUsers").addEventListener("click", () => showTab("users"));
            document.getElementById("btnBack").addEventListener("click", () => window.location.href = "dashboard.html");

            // ======================= TABS =======================
            function showTab(tab) {
                document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));
                if (tab === "games") {
                    document.getElementById("tabGames").classList.add("active");
                    loadGames();
                } else {
                    document.getElementById("tabUsers").classList.add("active");
                    loadUsers();
                }
            }

            // 🎮 =================== GERENCIAMENTO DE JOGOS ===================

            async function loadGames() {
                try {
                    const res = await fetch(store, { headers: getAuthHeaders() });
                    if (!res.ok) throw new Error("Falha ao carregar jogos.");
                    const games = await res.json();

                    const html = `
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h4>🎮 Jogos Cadastrados</h4>
                                    <button id="btnNewGame" class="btn btn-success btn-sm">➕ Novo Jogo</button>
                                </div>
                                <input id="searchGame" type="text" class="form-control mb-3" placeholder="🔍 Buscar jogo...">
                                <div id="gameList">${renderGames(games)}</div>
                            `;
                    document.getElementById("content").innerHTML = html;
                    window.allGames = games;

                    // Eventos dinâmicos
                    document.getElementById("btnNewGame").addEventListener("click", () => showGameForm());
                    document.getElementById("searchGame").addEventListener("input", e => filterGames(e));
                    attachGameButtons();
                } catch (err) {
                    alert("❌ Erro: " + err.message);
                }
            }

            function renderGames(games) {
                if (!games.length)
                    return "<div class='alert alert-info'>Nenhum jogo cadastrado.</div>";

                return games.map(g => `
                            <div class="card mb-3">
                                <div class="card-body">
                                    <h5>${g.title}</h5>
                                    <p>${g.description}</p>
                                    <p><strong>Gênero:</strong> ${g.genre} | <strong>Preço:</strong> R$${g.price}</p>
                                    <button class="btn btn-outline-primary btn-sm me-2 btn-edit" data-id="${g.id}">✏️ Editar</button>
                                    <button class="btn btn-outline-danger btn-sm btn-delete" data-id="${g.id}">🗑 Excluir</button>
                                </div>
                            </div>
                        `).join("");
            }

            function attachGameButtons() {
                document.querySelectorAll(".btn-edit").forEach(btn =>
                    btn.addEventListener("click", () => {
                        const game = window.allGames.find(g => g.id === btn.dataset.id);
                        showGameForm(game);
                    })
                );

                document.querySelectorAll(".btn-delete").forEach(btn =>
                    btn.addEventListener("click", async () => {
                        if (!confirm("Tem certeza que deseja excluir este jogo?")) return;
                        const res = await fetch(`${store}/${btn.dataset.id}`, {
                            method: "DELETE",
                            headers: getAuthHeaders()
                        });
                        if (res.ok) {
                            alert("🗑️ Jogo removido com sucesso!");
                            loadGames();
                        } else {
                            alert("❌ Erro ao remover jogo.");
                        }
                    })
                );
            }

            function filterGames(e) {
                const term = e.target.value.toLowerCase();
                const filtered = (window.allGames || []).filter(g => g.title.toLowerCase().includes(term));
                document.getElementById("gameList").innerHTML = renderGames(filtered);
                attachGameButtons();
            }

            function showGameForm(game = {}) {
                const isEdit = !!game.id;
                const html = `
                            <h5>${isEdit ? "✏️ Editar Jogo" : "➕ Novo Jogo"}</h5>
                            <form id="gameForm">
                                <div class="mb-2">
                                    <label>Título</label>
                                    <input class="form-control" id="gameTitle" value="${game.title || ""}" required>
                                </div>
                                <div class="mb-2">
                                    <label>Descrição</label>
                                    <textarea class="form-control" id="gameDesc" required>${game.description || ""}</textarea>
                                </div>
                                <div class="mb-2">
                                    <label>Gênero</label>
                                    <input class="form-control" id="gameGenre" value="${game.genre || ""}" required>
                                </div>
                                <div class="mb-2">
                                    <label>Preço</label>
                                    <input type="number" step="0.01" class="form-control" id="gamePrice" value="${game.price || ""}" required>
                                </div>
                                <button class="btn btn-${isEdit ? "primary" : "success"}">${isEdit ? "Salvar Alterações" : "Cadastrar"}</button>
                                <button type="button" class="btn btn-secondary ms-2" id="btnCancel">Cancelar</button>
                            </form>
                        `;
                document.getElementById("content").innerHTML = html;
                document.getElementById("gameForm").addEventListener("submit", e => saveGame(e, game.id || ""));
                document.getElementById("btnCancel").addEventListener("click", loadGames);
            }

            async function saveGame(e, id = "") {
                e.preventDefault();
                const body = {
                    title: document.getElementById("gameTitle").value,
                    description: document.getElementById("gameDesc").value,
                    genre: document.getElementById("gameGenre").value,
                    price: parseFloat(document.getElementById("gamePrice").value)
                };

                const url = id ? `${store}/${id}` : store;
                const method = id ? "PUT" : "POST";

                const res = await fetch(url, {
                    method,
                    headers: getAuthHeaders(),
                    body: JSON.stringify(body)
                });

                if (res.ok) {
                    alert(`✅ Jogo ${id ? "atualizado" : "criado"} com sucesso!`);
                    loadGames();
                } else {
                    alert("❌ Erro ao salvar jogo.");
                }
            }

            // 👥 =================== GERENCIAMENTO DE USUÁRIOS ===================

            async function loadUsers() {
                try {
                    const res = await fetch(mgmt, { headers: getAuthHeaders() });
                    if (!res.ok) throw new Error("Falha ao carregar usuários.");
                    const usersList = await res.json();

                    const html = `
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h4>👥 Usuários Cadastrados</h4>
                                    <button id="btnNewUser" class="btn btn-success btn-sm">➕ Novo Usuário</button>
                                </div>
                                <input id="searchUser" type="text" class="form-control mb-3" placeholder="🔍 Buscar usuário...">
                                <div id="userList">${renderUsers(usersList)}</div>
                            `;
                    document.getElementById("content").innerHTML = html;
                    window.allUsers = usersList;

                    document.getElementById("btnNewUser").addEventListener("click", () => showUserForm());
                    document.getElementById("searchUser").addEventListener("input", e => filterUsers(e));
                    attachUserButtons();
                } catch (err) {
                    alert("❌ Erro: " + err.message);
                }
            }

            function renderUsers(usersList) {
                if (!usersList.length)
                    return "<div class='alert alert-info'>Nenhum usuário cadastrado.</div>";

                return usersList.map(u => `
                            <div class="card mb-2">
                                <div class="card-body d-flex justify-content-between align-items-center">
                                    <div>
                                        <strong>${u.name}</strong><br>
                                        <small>${u.email}</small><br>
                                        <span class="badge bg-${u.role === "Admin" ? "danger" : "secondary"}">${u.role}</span>
                                    </div>
                                    <div>
                                        <button class="btn btn-outline-primary btn-sm me-2 btn-edit-user" data-id="${u.id}">✏️ Editar</button>
                                        <button class="btn btn-outline-danger btn-sm btn-delete-user" data-id="${u.id}">🗑 Excluir</button>
                                    </div>
                                </div>
                            </div>
                        `).join("");
            }

            function attachUserButtons() {
                document.querySelectorAll(".btn-edit-user").forEach(btn =>
                    btn.addEventListener("click", () => {
                        const user = window.allUsers.find(u => u.id === btn.dataset.id);
                        showUserForm(user);
                    })
                );

                document.querySelectorAll(".btn-delete-user").forEach(btn =>
                    btn.addEventListener("click", async () => {
                        if (!confirm("Tem certeza que deseja excluir este usuário?")) return;
                        const res = await fetch(`${mgmt}/${btn.dataset.id}`, {
                            method: "DELETE",
                            headers: getAuthHeaders()
                        });
                        if (res.ok) {
                            alert("🗑️ Usuário removido com sucesso!");
                            loadUsers();
                        } else {
                            alert("❌ Erro ao remover usuário.");
                        }
                    })
                );
            }

            function filterUsers(e) {
                const term = e.target.value.toLowerCase();
                const filtered = (window.allUsers || []).filter(u =>
                    u.name.toLowerCase().includes(term) || u.email.toLowerCase().includes(term)
                );
                document.getElementById("userList").innerHTML = renderUsers(filtered);
                attachUserButtons();
            }

            function showUserForm(user = {}) {
                const isEdit = !!user.id;
                const html = `
                            <h5>${isEdit ? "✏️ Editar Usuário" : "➕ Novo Usuário"}</h5>
                            <form id="userForm">
                                <div class="mb-2">
                                    <label>Nome</label>
                                    <input class="form-control" id="userName" value="${user.name || ""}" required>
                                </div>
                                <div class="mb-2">
                                    <label>Email</label>
                                    <input class="form-control" id="userEmail" type="email" value="${user.email || ""}" required>
                                </div>
                                <div class="mb-2">
                                    <label>Senha</label>
                                    <input class="form-control" id="userPassword" type="password" placeholder="${isEdit ? 'Deixe em branco para manter' : 'Informe a senha'}">
                                </div>
                                <div class="mb-2">
                                    <label>Perfil</label>
                                    <select class="form-control" id="userRole">
                                        <option value="User" ${user.role === "User" ? "selected" : ""}>Usuário</option>
                                        <option value="Admin" ${user.role === "Admin" ? "selected" : ""}>Admin</option>
                                    </select>
                                </div>
                                <button class="btn btn-${isEdit ? "primary" : "success"}">${isEdit ? "Salvar Alterações" : "Cadastrar"}</button>
                                <button type="button" class="btn btn-secondary ms-2" id="btnCancelUser">Cancelar</button>
                            </form>
                        `;
                document.getElementById("content").innerHTML = html;

                document.getElementById("userForm").addEventListener("submit", e => saveUser(e, user.id || ""));
                document.getElementById("btnCancelUser").addEventListener("click", loadUsers);
            }

            async function saveUser(e, id = "") {
                e.preventDefault();
                const body = {
                    name: document.getElementById("userName").value,
                    email: document.getElementById("userEmail").value,
                    passwordHash: document.getElementById("userPassword").value || undefined,
                    role: document.getElementById("userRole").value
                };

                const url = id ? `${mgmt}/${id}` : mgmt;
                const method = id ? "PUT" : "POST";

                const res = await fetch(url, {
                    method,
                    headers: getAuthHeaders(),
                    body: JSON.stringify(body)
                });

                if (res.ok) {
                    alert(`✅ Usuário ${id ? "atualizado" : "criado"} com sucesso!`);
                    loadUsers();
                } else {
                    alert("❌ Erro ao salvar usuário.");
                }
            }

            // 🚀 Aba padrão
            showTab("games");
        });
    </script>
</body>
</html>
