<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>FCG Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <script src="config.js"></script>
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4 text-primary"><i class="bi bi-controller"></i> FIAP Cloud Games (FCG)</h2>

        <ul class="nav nav-tabs mb-3" id="dashboardTabs">
            <li class="nav-item"><button class="nav-link active" onclick="showTab('profile')">👤 Meu Perfil</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('store')">🛒 Loja</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('library')">📚 Minha Biblioteca</button></li>
            <li class="nav-item ms-auto"><button class="btn btn-danger" onclick="logout()">🚪 Sair</button></li>
        </ul>

        <!-- Filtro loja (agora chama Elasticsearch via BFF) -->
        <div id="storeFilter" class="mb-3" style="display:none;">
            <div class="d-flex gap-2 align-items-center">
                <input class="form-control" id="searchInput"
                       placeholder="🔎 Buscar (Elastic) por título/descrição/gênero..."
                       oninput="onStoreSearchInput()">
                <button class="btn btn-outline-secondary" onclick="clearStoreSearch()" title="Limpar busca">✖</button>
            </div>
            <div class="form-text">
                Dica: digite pelo menos <strong>2</strong> caracteres. Se vazio, volta ao catálogo completo.
            </div>
        </div>

        <div id="libraryFilter" class="mb-3" style="display:none;">
            <input class="form-control" id="librarySearch" placeholder="🔍 Buscar na biblioteca" oninput="filterLibrary()">
        </div>

        <div id="admin-btn" class="mb-3" style="display:none;">
            <button class="btn btn-warning" onclick="goToAdmin()"><i class="bi bi-tools"></i> Área Administrativa</button>
        </div>

        <!-- Área de recomendações (aparece quando você clicar) -->
        <div id="recommendBox" style="display:none;"></div>

        <div id="output"></div>
    </div>

    <script>
        // ========= Helpers de campo / compat JSON (camelCase vs PascalCase) =========
        const pick = (obj, ...keys) => {
            for (const k of keys) {
                if (obj && obj[k] !== undefined && obj[k] !== null) return obj[k];
            }
            return undefined;
        };
        const gameIdOf = g => pick(g, "id", "Id", "gameId", "GameId");
        const titleOf = g => pick(g, "title", "Title") ?? "Jogo";
        const descOf = g => pick(g, "description", "Description") ?? "";
        const genreOf = g => pick(g, "genre", "Genre") ?? "";
        const priceOf = g => pick(g, "price", "Price");

        // ========= Bootstrap / sessão =========
        if (!window.apiConfig || !apiConfig.ensureAuthenticated()) {
            // ensureAuthenticated já redireciona
        } else {
            fetch(`${apiConfig.users}/me`, { headers: apiConfig.getAuthHeaders() })
                .then(r => {
                    if (!r.ok) throw new Error("Falha ao autenticar.");
                    return r.json();
                })
                .then(u => {
                    window.currentUser = u;
                    if (u.role === "Admin") document.getElementById("admin-btn").style.display = "block";
                    loadProfile(u);
                })
                .catch(err => {
                    alert("❌ Erro: " + err.message);
                    localStorage.removeItem("fcg_token");
                    window.location.href = "login.html";
                });
        }

        // ========= Tabs =========
        function showTab(tab) {
            document.getElementById("storeFilter").style.display = "none";
            document.getElementById("libraryFilter").style.display = "none";
            hideRecommendations();

            if (tab === "profile") getProfile();
            if (tab === "store") {
                document.getElementById("storeFilter").style.display = "block";
                openStore();
            }
            if (tab === "library") {
                document.getElementById("libraryFilter").style.display = "block";
                listMyGames();
            }
        }

        // ========= Perfil =========
        function getProfile() {
            fetch(`${apiConfig.users}/me`, { headers: apiConfig.getAuthHeaders() })
                .then(r => r.json())
                .then(loadProfile);
        }

        function loadProfile(data) {
            const html = `
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title">👤 Meu Perfil</h5>
                <form onsubmit="updateProfile(event)">
                  <div class="mb-2">
                    <label>Nome</label>
                    <input type="text" class="form-control" id="name" value="${data.name}" required>
                  </div>
                  <div class="mb-2">
                    <label>Email</label>
                    <input type="email" class="form-control" id="email" value="${data.email}" required>
                  </div>
                  <div class="mb-2">
                    <label>Perfil</label>
                    <input type="text" class="form-control" value="${data.role === 'User' ? 'Usuário' : data.role}" disabled>
                  </div>
                  <button type="submit" class="btn btn-primary">💾 Salvar Alterações</button>
                </form>

                <hr>
                <h6>🔑 Alterar Senha</h6>
                <form onsubmit="changePassword(event)">
                  <div class="mb-2"><input type="password" class="form-control" id="currentPassword" placeholder="Senha atual" required></div>
                  <div class="mb-2"><input type="password" class="form-control" id="newPassword" placeholder="Nova senha" required></div>
                  <button type="submit" class="btn btn-outline-secondary">🔄 Atualizar Senha</button>
                </form>
              </div>
            </div>`;
            show(html);
        }

        function updateProfile(e) {
            e.preventDefault();
            const body = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value
            };
            fetch(`${apiConfig.users}/me`, {
                method: "PUT",
                headers: apiConfig.getAuthHeaders(),
                body: JSON.stringify(body)
            }).then(async r => {
                if (r.ok) { alert("✅ Dados atualizados!"); getProfile(); }
                else { alert("❌ Erro: " + await r.text()); }
            });
        }

        function changePassword(e) {
            e.preventDefault();
            const body = {
                currentPassword: document.getElementById("currentPassword").value,
                newPassword: document.getElementById("newPassword").value
            };
            fetch(`${apiConfig.users}/me/password`, {
                method: "PUT",
                headers: apiConfig.getAuthHeaders(),
                body: JSON.stringify(body)
            }).then(async r => {
                if (r.ok) { alert("🔐 Senha alterada com sucesso!"); e.target.reset(); }
                else { alert("❌ Erro: " + await r.text()); }
            });
        }

        // ========= Biblioteca/cache =========
        async function refreshLibraryCache() {
            const r = await fetch(apiConfig.library, { headers: apiConfig.getAuthHeaders() });
            if (!r.ok) return [];

            const raw = await r.json();
            const ids = raw.map(g => gameIdOf(g)).filter(Boolean);

            window.cachedLibraryIds = ids.slice();
            return ids;
        }

        // ========= Loja: catálogo + analytics =========
        let storeSearchTimer = null;
        window.allGames = window.allGames || [];
        window.ownedIds = window.ownedIds || [];
        window.storeMode = "catalog"; // "catalog" | "search"

        async function openStore() {
            try {
                // 1) cache de adquiridos
                await refreshLibraryCache();

                // 2) carrega catálogo (APIM via BFF)
                const r = await fetch(apiConfig.store, { headers: apiConfig.getAuthHeaders() });
                if (!r.ok) throw new Error("Falha ao carregar lista de jogos da loja.");
                const storeGames = await r.json();
                storeGames.sort((a, b) => (titleOf(a)).localeCompare(titleOf(b)));

                window.allGames = storeGames;
                window.ownedIds = Array.isArray(window.cachedLibraryIds) ? window.cachedLibraryIds : [];

                // 3) carrega analytics (Elastic)
                await loadAnalyticsSafe();

                // 4) render inicial (catálogo)
                window.storeMode = "catalog";
                renderStore(storeGames, { source: "Catálogo" });
            } catch (e) {
                console.error(e);
                alert("❌ Erro ao carregar loja: " + e.message);
            }
        }

        async function loadAnalyticsSafe() {
            try {
                const [topRes, pricesRes] = await Promise.all([
                    fetch(apiConfig.analyticsTop, { headers: apiConfig.getAuthHeaders() }),
                    fetch(apiConfig.analyticsPrices, { headers: apiConfig.getAuthHeaders() })
                ]);

                if (topRes.ok) window.analyticsTop = await topRes.json();
                if (pricesRes.ok) window.analyticsPrices = await pricesRes.json();
            } catch (e) {
                console.warn("Analytics indisponível:", e);
            }
        }

        function onStoreSearchInput() {
            const term = (document.getElementById("searchInput").value || "").trim();

            if (storeSearchTimer) clearTimeout(storeSearchTimer);

            storeSearchTimer = setTimeout(async () => {
                if (term.length < 2) {
                    window.storeMode = "catalog";
                    renderStore(window.allGames || [], { source: "Catálogo" });
                    return;
                }

                try {
                    window.storeMode = "search";
                    const url = `${apiConfig.search}?q=${encodeURIComponent(term)}`;
                    const r = await fetch(url, { headers: apiConfig.getAuthHeaders() });
                    const txt = await r.text();
                    if (!r.ok) throw new Error(txt || "Falha no search.");

                    const results = JSON.parse(txt);
                    renderStore(results, { source: `Elastic (q="${term}")` });
                } catch (e) {
                    console.error(e);
                    alert("❌ Erro no search: " + e.message);
                }
            }, 300); // debounce
        }

        function clearStoreSearch() {
            document.getElementById("searchInput").value = "";
            window.storeMode = "catalog";
            renderStore(window.allGames || [], { source: "Catálogo" });
        }

        // ========= Biblioteca =========
        async function listMyGames() {
            try {
                const r = await fetch(apiConfig.library, { headers: apiConfig.getAuthHeaders() });
                if (!r.ok) throw new Error("Falha ao carregar biblioteca.");

                const raw = await r.json();

                const ids = raw.map(g => gameIdOf(g)).filter(Boolean);
                window.cachedLibraryIds = ids.slice();

                const hasDetails = raw.length > 0 && (pick(raw[0], "title", "Title") || pick(raw[0], "price", "Price"));
                let detailed = raw;

                if (!hasDetails) {
                    const storeList = window.allGames && window.allGames.length
                        ? window.allGames
                        : await fetch(apiConfig.store, { headers: apiConfig.getAuthHeaders() }).then(x => x.json());

                    detailed = storeList.filter(g => ids.includes(gameIdOf(g)));
                }

                window.myGamesList = detailed;
                renderLibrary(detailed);
            } catch (e) {
                console.error(e);
                alert("❌ Erro ao carregar biblioteca: " + e.message);
            }
        }

        // ========= Renderizações =========
        function renderAnalytics() {
            const top = window.analyticsTop;
            const prices = window.analyticsPrices;

            const topHtml = top?.topGenres?.length
                ? top.topGenres.map(x => `<li class="list-group-item d-flex justify-content-between align-items-center">
                  <span>${x.genre}</span>
                  <span class="badge bg-primary rounded-pill">${x.count}</span>
                </li>`).join("")
                : `<li class="list-group-item text-muted">Sem dados</li>`;

            const avg = (top && top.averagePrice !== undefined)
                ? Number(top.averagePrice).toFixed(2)
                : "-";

            const priceHtml = Array.isArray(prices) && prices.length
                ? prices.map(p => `<li class="list-group-item d-flex justify-content-between align-items-center">
                  <span>${p.faixa ?? p.Faixa ?? "-"}</span>
                  <span class="badge bg-secondary rounded-pill">${p.quantidade ?? p.Quantidade ?? 0}</span>
                </li>`).join("")
                : `<li class="list-group-item text-muted">Sem dados</li>`;

            const showReindex = window.currentUser?.role === "Admin";

            return `
            <div class="row g-3 mb-3">
              <div class="col-lg-6">
                <div class="card shadow-sm">
                  <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                      <h6 class="mb-2">📊 Top gêneros</h6>
                      <span class="badge bg-dark">Elastic</span>
                    </div>
                    <ul class="list-group list-group-flush mb-2">${topHtml}</ul>
                    <div class="text-muted">💰 Preço médio: <strong>R$${avg}</strong></div>
                  </div>
                </div>
              </div>

              <div class="col-lg-6">
                <div class="card shadow-sm">
                  <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                      <h6 class="mb-2">💸 Faixas de preço</h6>
                      <span class="badge bg-dark">Elastic</span>
                    </div>
                    <ul class="list-group list-group-flush mb-2">${priceHtml}</ul>
                    ${showReindex ? `
                      <button class="btn btn-outline-primary btn-sm" onclick="runReindex()">
                        🔄 Reindexar (Admin)
                      </button>
                    ` : ``}
                  </div>
                </div>
              </div>
            </div>
          `;
        }

        function renderStore(games, opts = {}) {
            const source = opts.source ? `<span class="badge bg-info text-dark ms-2">${opts.source}</span>` : "";

            const analytics = renderAnalytics();

            const listHtml = (games && games.length)
                ? games.map(g => {
                    const id = gameIdOf(g);
                    const owned = window.ownedIds?.includes(id);

                    return `
                  <div class="card mb-3 shadow-sm border-${owned ? 'secondary' : 'primary'}">
                    <div class="card-body">
                      <div class="d-flex justify-content-between align-items-start">
                        <div>
                          <h5 class="card-title mb-1">${titleOf(g)}</h5>
                          <div class="text-muted small">${genreOf(g)}</div>
                        </div>
                        <div class="text-end">
                          <div class="fw-bold">${priceOf(g) !== undefined ? `R$${Number(priceOf(g)).toFixed(2)}` : ""}</div>
                        </div>
                      </div>

                      <p class="card-text mt-2">${descOf(g)}</p>

                      <div class="d-flex gap-2">
                        <button class="btn btn-${owned ? 'secondary' : 'primary'} btn-sm"
                          ${owned ? 'disabled' : `onclick="buyGame('${id}')"`}>
                          ${owned ? '🎮 Já adquirido' : '🎁 Adquirir'}
                        </button>

                        <button class="btn btn-outline-dark btn-sm" onclick="showRecommendations('${id}', '${escapeHtml(titleOf(g))}')">
                          ✨ Recomendar
                        </button>
                      </div>
                    </div>
                  </div>`;
                }).join("")
                : `<div class="alert alert-info">Nenhum jogo encontrado.</div>`;

            show(`
            <div class="d-flex align-items-center mb-2">
              <h4 class="mb-0">🛒 Loja de Jogos</h4>
              ${source}
            </div>
            ${analytics}
            ${listHtml}
          `);
        }

        function renderLibrary(games) {
            const html = (games && games.length > 0)
                ? games.map(g => {
                    const id = gameIdOf(g);
                    return `
                  <div class="card mb-3 shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">
                      <div>
                        <h5 class="mb-1">${titleOf(g)}</h5>
                        <div class="text-muted small">${genreOf(g)}</div>
                        <p class="mb-1">${descOf(g)}</p>
                        <strong>${priceOf(g) !== undefined ? `R$${Number(priceOf(g)).toFixed(2)}` : ""}</strong>
                      </div>
                      <div class="d-flex flex-column gap-2">
                        <button class="btn btn-outline-danger btn-sm" onclick="removeGame('${id}')">🗑 Remover</button>
                        <button class="btn btn-outline-dark btn-sm" onclick="showRecommendations('${id}', '${escapeHtml(titleOf(g))}')">✨ Recomendar</button>
                      </div>
                    </div>
                  </div>`;
                }).join("")
                : "<div class='alert alert-info'>Nenhum jogo adquirido ainda.</div>";

            show(`<h4>📚 Minha Biblioteca</h4>${html}`);
        }

        async function removeGame(gameId) {
            if (!confirm("Tem certeza que deseja remover este jogo da sua biblioteca?")) return;

            const res = await fetch(`${apiConfig.library}/${gameId}`, {
                method: "DELETE",
                headers: apiConfig.getAuthHeaders()
            });

            if (res.ok) {
                alert("🗑️ Jogo removido da biblioteca!");
                await listMyGames();
                await openStore(); // recarrega catálogo + cache
            } else {
                alert("❌ Erro ao remover o jogo: " + await res.text());
            }
        }

        // ========= Compra =========
        async function buyGame(gameId) {
            try {
                const payRes = await fetch(`${apiConfig.payments}/payments/buy?gameId=${gameId}`, {
                    method: "POST",
                    headers: apiConfig.getAuthHeaders()
                });

                const payText = await payRes.text();

                if (payRes.status === 202) {
                    console.warn("Pagamento OK, mas biblioteca falhou. Tentando fallback no Users.", payText);

                    const libRes = await fetch(`${apiConfig.library}?gameId=${gameId}`, {
                        method: "POST",
                        headers: apiConfig.getAuthHeaders()
                    });

                    const libText = await libRes.text();
                    if (!libRes.ok && !libText.toLowerCase().includes("já adquirido")) {
                        alert("⚠️ Pagamento OK, mas falhou ao adicionar na biblioteca: " + libText);
                        return;
                    }

                    alert("🎉 Pagamento OK e jogo adicionado à biblioteca com sucesso!");
                    await listMyGames();
                    await openStore();
                    return;
                }

                if (!payRes.ok) {
                    alert("❌ Falha na compra: " + payText);
                    return;
                }

                alert("🎉 Jogo adquirido com sucesso!");
                await listMyGames();
                await openStore();
            } catch (e) {
                console.error(e);
                alert("❌ Erro inesperado ao comprar: " + e.message);
            }
        }

        // ========= Recomendações =========
        function escapeHtml(s) {
            return String(s || "")
                .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;").replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        async function showRecommendations(gameId, gameTitle) {
            try {
                const box = document.getElementById("recommendBox");
                box.style.display = "block";
                box.innerHTML = `
              <div class="card shadow-sm mb-3">
                <div class="card-body">
                  <div class="d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">✨ Recomendações para: <span class="text-primary">${gameTitle}</span></h5>
                    <button class="btn btn-sm btn-outline-secondary" onclick="hideRecommendations()">✖</button>
                  </div>
                  <div class="text-muted small mb-2">Fonte: Elasticsearch</div>
                  <div id="recommendBody" class="mt-2">Carregando...</div>
                </div>
              </div>
            `;

                const url = `${apiConfig.recommendSimilar}/${encodeURIComponent(gameId)}`;
                const r = await fetch(url, { headers: apiConfig.getAuthHeaders() });
                const txt = await r.text();
                if (!r.ok) throw new Error(txt || "Falha ao buscar recomendações.");

                const list = JSON.parse(txt);
                const html = (list && list.length)
                    ? list.map(g => {
                        const id = gameIdOf(g);
                        const owned = window.ownedIds?.includes(id);
                        return `
                    <div class="card mb-2">
                      <div class="card-body">
                        <div class="d-flex justify-content-between">
                          <div>
                            <strong>${titleOf(g)}</strong>
                            <div class="text-muted small">${genreOf(g)}</div>
                          </div>
                          <div class="text-end">
                            <div class="fw-bold">${priceOf(g) !== undefined ? `R$${Number(priceOf(g)).toFixed(2)}` : ""}</div>
                          </div>
                        </div>
                        <div class="mt-2">${descOf(g)}</div>
                        <div class="mt-2">
                          <button class="btn btn-${owned ? 'secondary' : 'primary'} btn-sm"
                            ${owned ? 'disabled' : `onclick="buyGame('${id}')"`}>
                            ${owned ? '🎮 Já adquirido' : '🎁 Adquirir'}
                          </button>
                        </div>
                      </div>
                    </div>
                  `;
                    }).join("")
                    : `<div class="alert alert-info mb-0">Sem recomendações (poucos similares no índice).</div>`;

                document.getElementById("recommendBody").innerHTML = html;
                window.scrollTo({ top: 0, behavior: "smooth" });
            } catch (e) {
                console.error(e);
                alert("❌ Erro nas recomendações: " + e.message);
            }
        }

        function hideRecommendations() {
            const box = document.getElementById("recommendBox");
            box.style.display = "none";
            box.innerHTML = "";
        }

        // ========= Reindex (Admin) =========
        async function runReindex() {
            if (window.currentUser?.role !== "Admin") {
                alert("❌ Somente Admin pode reindexar.");
                return;
            }
            if (!confirm("Reindexar agora? Isso pode levar alguns segundos.")) return;

            try {
                const r = await fetch(apiConfig.reindex, {
                    method: "POST",
                    headers: apiConfig.getAuthHeaders()
                });

                const txt = await r.text();
                if (!r.ok) throw new Error(txt || "Falha no reindex.");

                alert("✅ Reindex executado!\n" + txt);

                // após reindex, recarrega analytics e loja
                await loadAnalyticsSafe();
                if (window.storeMode === "search") {
                    onStoreSearchInput();
                } else {
                    renderStore(window.allGames || [], { source: "Catálogo" });
                }
            } catch (e) {
                alert("❌ Erro no reindex: " + e.message);
            }
        }

        // ========= Utilitários =========
        function goToAdmin() { window.location.href = "admin.html"; }
        function logout() { localStorage.removeItem("fcg_token"); window.location.href = "login.html"; }
        function show(html) { document.getElementById("output").innerHTML = html; }

        // ========= Filtro Biblioteca =========
        function filterLibrary() {
            const term = (document.getElementById("librarySearch").value || "").toLowerCase();
            const filtered = (window.myGamesList || []).filter(g => (titleOf(g) + "").toLowerCase().includes(term));
            renderLibrary(filtered);
        }
    </script>
</body>
</html>
