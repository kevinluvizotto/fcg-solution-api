<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - FIAP Cloud Games</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            max-width: 380px;
            width: 100%;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,.1);
        }

        .toggle-link {
            cursor: pointer;
            color: #0d6efd;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card p-4">
        <h4 class="text-center mb-3 text-primary">
            <i class="bi bi-controller"></i> FIAP Cloud Games
        </h4>
        <div id="loginForm">
            <h5 class="text-center mb-3">🔐 Login</h5>
            <form onsubmit="login(event)">
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Senha</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">Entrar</button>
            </form>
            <p class="text-center mt-3">
                Primeiro acesso? <span class="toggle-link" onclick="showRegister()">Criar conta</span>
            </p>
        </div>

        <div id="registerForm" style="display:none;">
            <h5 class="text-center mb-3">🆕 Criar Conta</h5>
            <form onsubmit="register(event)">
                <div class="mb-3">
                    <label>Nome</label>
                    <input type="text" id="regName" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" id="regEmail" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Senha</label>
                    <input type="password" id="regPassword" class="form-control" required>
                </div>
                <button class="btn btn-success w-100" type="submit">Cadastrar</button>
            </form>
            <p class="text-center mt-3">
                Já tem conta? <span class="toggle-link" onclick="showLogin()">Voltar ao login</span>
            </p>
        </div>
    </div>

    <script>
        const apimBaseUrl = "https://fcg-apim-fiap-klztt.azure-api.net";
        const usersApi = `${apimBaseUrl}/users`;

        function showRegister() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("registerForm").style.display = "block";
        }

        function showLogin() {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("registerForm").style.display = "none";
        }

        async function login(e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const response = await fetch(`${usersApi}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, passwordHash: password })
                });

                if (!response.ok) {
                    const msg = await response.text();
                    throw new Error(msg || "Falha no login");
                }

                const data = await response.json();
                localStorage.setItem("fcg_token", data.token);
                alert("✅ Login realizado com sucesso!");
                window.location.href = "dashboard.html";
            } catch (err) {
                alert("❌ Erro: " + err.message);
            }
        }

        async function register(e) {
            e.preventDefault();
            const name = document.getElementById("regName").value;
            const email = document.getElementById("regEmail").value;
            const password = document.getElementById("regPassword").value;

            try {
                const response = await fetch(`${usersApi}/users`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, passwordHash: password })
                });

                if (!response.ok) {
                    const msg = await response.text();
                    throw new Error(msg || "Falha no cadastro");
                }

                alert("🎉 Conta criada com sucesso! Faça login.");
                showLogin();
            } catch (err) {
                alert("❌ Erro: " + err.message);
            }
        }
    </script>
</body>
</html>
